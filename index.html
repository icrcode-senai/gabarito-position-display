<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Propriedade Display e Position</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Propriedade Display e Position - CSS</h1>
    </header>

    <nav class="menu">
        <p>Menu Fixo (position: fixed)</p>
    </nav>

    <section>
        <h2>Display: block</h2>
        <div class="block">
            <p class="elemento">Elemento 1</p>
        </div>
        <div class="block">
            <p class="menu">Elemento 2</p>
        </div>
    </section>

    <section>
        <h2>Display: inline</h2>
        <span class="inline">
            <p class="menu">Elemento 1</p>
        </span>
        <span class="inline">
            <p class="menu">Elemento 2</p>
        </span>
    </section>

    <section>
        <h2>Display: inline-block</h2>
        <div class="inline-block">
            <p class="menu">Elemento 1</p>
        </div>
        <div class="inline-block">
            <p class="menu">Elemento 2</p>
        </div>
    </section>

    <section>
        <h2>Display: flex</h2>
        <div class="flex">
            <div>
                <p class="menu">1</p>
            </div>
            <div>
                <p class="menu">2</p>
            </div>
            <div>
                <p class="menu">3</p>
            </div>
        </div>
    </section>

    <section>
        <h2>Display: grid</h2>
        <div class="grid">
            <div>
                <p class="menu">1</p>
            </div>
            <div>
                <p class="menu">2</p>
            </div>
            <div>
                <p class="menu">3</p>
            </div>
            <div>
                <p class="menu">4</p>
            </div>
        </div>
    </section>

    <section>
        <h2>Position</h2>

        <div class="relative">
            Relative
            <div class="absolute">
                <p class="menu">Absolute</p>
            </div>
        </div>

        <div class="sticky">
            <p class="elemento">Sticky</p>
        </div>

    </section>

    <footer>
        <a href="www.github.com/icrcode-senai">
            <p class="elemento">@icrcode-senai</p>
        </a>
    </footer>

</body>

</html>
